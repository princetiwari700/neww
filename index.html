<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prince Ki Dukan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* PARTICLES */
#bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* LOADER */
#loader{
position:fixed;width:100%;height:100%;
background:#020617;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
z-index:9999;
}

.logo3d{font-size:70px;animation:spin 2s;}
@keyframes spin{
0%{transform:scale(0) rotateY(180deg);}
100%{transform:scale(1) rotateY(0);}
}

.hide{opacity:0;visibility:hidden;transition:0.6s}

/* NAV */
.nav{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
padding:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:100;
}

.search{
flex:1;
max-width:300px;
padding:8px 12px;
border-radius:10px;
border:none;
}

/* CART BUTTON */
.cart-btn{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
padding:8px 14px;
border-radius:30px;
cursor:pointer;
display:flex;
align-items:center;
gap:5px;
font-size:14px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* HERO */
.banner{
margin:20px;
padding:20px;
border-radius:20px;
background:linear-gradient(135deg,#22c55e,#4ade80);
}

/* CATEGORY */
.categories{
display:flex;
gap:10px;
padding:10px 20px;
overflow-x:auto;
}

.cat{
padding:8px 15px;
border-radius:20px;
background:white;
color:black;
cursor:pointer;
}

.cat.active{
background:#22c55e;
color:white;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:20px;
padding:20px;
perspective:1000px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:18px;
padding:10px;
backdrop-filter:blur(10px);
transition:0.4s;
}

.card:hover{
transform:rotateY(8deg) rotateX(8deg) scale(1.05);
}

.card img{
width:100%;
border-radius:12px;
}

button{
width:100%;
padding:8px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
margin-top:5px;
cursor:pointer;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(5px);
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:998;
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* CART PANEL */
.cart{
position:fixed;
right:-100%;
top:0;
width:320px;
height:100%;
background:#020617;
padding:20px;
transition:0.4s;
z-index:999;
border-left:1px solid rgba(255,255,255,0.1);
}

.cart.active{
right:0;
}

/* CART ITEMS */
.item{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.05);
padding:8px 10px;
border-radius:10px;
margin:10px 0;
}

.item button{
background:red;
border:none;
color:white;
border-radius:6px;
padding:3px 6px;
cursor:pointer;
}

/* FORM */
#orderForm input{
width:100%;
margin:5px 0;
padding:8px;
border-radius:8px;
border:none;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div id="loader">
<div class="logo3d">🛒</div>
<h1>Prince Ki Dukan</h1>
</div>

<canvas id="bg"></canvas>

<div class="nav">
<div>🛒 Prince ki dukan</div>
<input class="search" placeholder="Search..." onkeyup="search(this.value)">
<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
</div>

<div class="banner">🚚 10 min delivery | Fresh items 🌿</div>

<div class="categories">
<div class="cat active" onclick="filter('all')">All</div>
<div class="cat" onclick="filter('daily')">Daily</div>
<div class="cat" onclick="filter('snacks')">Snacks</div>
<div class="cat" onclick="filter('drinks')">Drinks</div>
</div>

<div class="products" id="products"></div>

<div class="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total ₹<span id="total">0</span></h3>

<form id="orderForm">
<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="address" placeholder="Your Address" required>
<input type="tel" id="phone" placeholder="Phone Number" required>
<button type="submit">Place Order (Email)</button>
</form>

<button onclick="order()">Order on WhatsApp</button>
</div>

<script>
window.onload=()=>{
setTimeout(()=>document.getElementById("loader").classList.add("hide"),2000);
};

/* PARTICLES */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function anim(){
ctx.clearRect(0,0,c.width,c.height);
p.forEach(a=>{
ctx.beginPath();
ctx.arc(a.x,a.y,a.r,0,6.28);
ctx.fillStyle="rgba(34,197,94,0.5)";
ctx.fill();
a.y+=0.3;if(a.y>c.height)a.y=0;
});
requestAnimationFrame(anim);
}
anim();

/* DATA */
let items=[
{name:"Milk",price:700,cat:"daily",img:"https://i.ibb.co/KcJ8S7PC/Screenshot-2026-03-20-144810.png"},
{name:"Bread",price:30,cat:"daily",img:"https://images.unsplash.com/photo-1608198093002-ad4e005484ec"},
{name:"Chips",price:20,cat:"snacks",img:"https://i.ibb.co/9HVF5bDn/Screenshot-2026-03-20-144918.png"},
{name:"Cola",price:40,cat:"drinks",img:"https://i.ibb.co/6c1g0TwH/Screenshot-2026-03-21-204222.png"},
{name:"Namkeen",price:82,cat:"snacks",img:"https://i.ibb.co/TMyLq3Zm/Screenshot-2026-03-21-205417.png"
];

let cart={};

function show(d){
let box=document.getElementById("products");
box.innerHTML="";
d.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="add('${p.name}',${p.price})">Add</button>
</div>`;
});
}
show(items);

function filter(cat){
document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
event.target.classList.add("active");
if(cat=="all") show(items);
else show(items.filter(i=>i.cat==cat));
}

function search(val){
show(items.filter(i=>i.name.toLowerCase().includes(val.toLowerCase())));
}

function add(name,price){
if(!cart[name]) cart[name]={qty:0,price};
cart[name].qty++;
update();
toast(name+" added");
}

function update(){
let box=document.getElementById("cartItems");
box.innerHTML="";
let total=0,count=0;

for(let i in cart){
let p=cart[i];
total+=p.qty*p.price;
count+=p.qty;

box.innerHTML+=`
<div class="item">
${i} x${p.qty}
<button onclick="removeItem('${i}')">❌</button>
</div>`;
}

document.getElementById("total").innerText=total;
document.getElementById("count").innerText=count;
}

function removeItem(i){
delete cart[i];
update();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
document.querySelector(".overlay").classList.toggle("active");
}

/* WHATSAPP */
function order(){
let msg="Order:%0A";
for(let i in cart){
msg+=i+" x"+cart[i].qty+"%0A";
}
msg+="Total ₹"+document.getElementById("total").innerText;
window.open("https://wa.me/919625785847?text="+msg);
}

/* EMAIL (Formspree) */
document.getElementById("orderForm").addEventListener("submit", function(e){
e.preventDefault();

let itemsText="";
for(let i in cart){
itemsText+=i+" x"+cart[i].qty+"\\n";
}

fetch("https://formspree.io/f/meerdoqg", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
address:document.getElementById("address").value,
order:itemsText,
total:document.getElementById("total").innerText
})
})
.then(()=>alert("Order sent on Email ✅"))
.catch(()=>alert("Error ❌"));
});

/* TOAST */
function toast(m){
let t=document.createElement("div");
t.className="toast";
t.innerText=m;
document.body.appendChild(t);
setTimeout(()=>t.remove(),1500);
}
</script>

</body>
</html>
